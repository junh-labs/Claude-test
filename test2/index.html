<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 粒子星空 — 交互式星域特效</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    overflow: hidden;
    background: #050510;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    cursor: none;
    user-select: none;
    -webkit-user-select: none;
  }

  canvas {
    display: block;
    position: fixed;
    top: 0;
    left: 0;
  }

  /* ---- 自定义光标 ---- */
  .cursor {
    position: fixed;
    pointer-events: none;
    z-index: 1000;
    transform: translate(-50%, -50%);
    transition: width 0.15s ease, height 0.15s ease,
                background 0.15s ease, box-shadow 0.15s ease;
  }
  .cursor-outer {
    width: 36px;
    height: 36px;
    border: 2px solid rgba(180, 200, 255, 0.45);
    border-radius: 50%;
    backdrop-filter: blur(2px);
  }
  .cursor-inner {
    width: 8px;
    height: 8px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    box-shadow: 0 0 18px 6px rgba(140, 180, 255, 0.7);
  }

  /* ---- HUD 信息面板 ---- */
  .hud {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 18px;
    background: rgba(10, 15, 35, 0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 40px;
    padding: 10px 26px;
    pointer-events: none;
  }
  .hud-item {
    display: flex;
    align-items: center;
    gap: 7px;
    color: rgba(200, 215, 255, 0.85);
    font-size: 13px;
    letter-spacing: 0.4px;
  }
  .hud-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    box-shadow: 0 0 8px currentColor;
  }
  .hud-val {
    color: #fff;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }

  /* ---- 提示文字 ---- */
  .hint {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 90;
    color: rgba(200, 215, 255, 0.6);
    font-size: 15px;
    letter-spacing: 2px;
    pointer-events: none;
    animation: hintPulse 3s ease-in-out infinite;
    transition: opacity 0.8s ease;
  }
  @keyframes hintPulse {
    0%, 100% { opacity: 0.35; }
    50%      { opacity: 0.8;  }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<!-- 自定义光标 -->
<div class="cursor cursor-outer" id="cursorOuter"></div>
<div class="cursor cursor-inner" id="cursorInner"></div>

<!-- 底部 HUD -->
<div class="hud" id="hud">
  <div class="hud-item">
    <span class="hud-dot" style="color:#6cf;"></span>
    <span>粒子</span>
    <span class="hud-val" id="hudCount">0</span>
  </div>
  <div class="hud-item">
    <span class="hud-dot" style="color:#f8a;"></span>
    <span>连线</span>
    <span class="hud-val" id="hudLines">0</span>
  </div>
  <div class="hud-item">
    <span class="hud-dot" style="color:#af8;"></span>
    <span>FPS</span>
    <span class="hud-val" id="hudFPS">0</span>
  </div>
</div>

<!-- 初始提示 -->
<div class="hint" id="hint">✦ 移动鼠标探索星空 ✦</div>

<script>
// ─────────────────────────────────────
//  粒子星空 — 交互式星域特效
// ─────────────────────────────────────

(() => {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');

  // ── DOM 元素 ─────────────────────
  const cursorOuter = document.getElementById('cursorOuter');
  const cursorInner = document.getElementById('cursorInner');
  const hintEl     = document.getElementById('hint');
  const hudCount   = document.getElementById('hudCount');
  const hudLines   = document.getElementById('hudLines');
  const hudFPS     = document.getElementById('hudFPS');

  // ── 状态 ─────────────────────────
  let W, H, centerX, centerY;
  let mouseX = 99999, mouseY = 99999;       // 鼠标实际位置
  let smoothMX = 99999, smoothMY = 99999;    // 平滑后位置（粒子跟随此值）
  let mouseActive = false;
  let mouseOnCanvas = false;

  // ── 粒子数组 ────────────────────
  let particles = [];
  const PARTICLE_COUNT = 260;

  // ── 性能统计 ────────────────────
  let frameCount = 0, fps = 0, lastFpsTime = performance.now();
  let visibleLines = 0;

  // ── 配色 ────────────────────────
  const PALETTES = [
    { r: 160, g: 210, b: 255 },   // 冰蓝
    { r: 255, g: 180, b: 220 },   // 粉
    { r: 180, g: 230, b: 255 },   // 淡蓝
    { r: 255, g: 200, b: 160 },   // 暖橙
    { r: 200, g: 170, b: 255 },   // 淡紫
    { r: 140, g: 255, b: 220 },   // 青绿
  ];

  // ═══════════════════════════════════
  //  工具函数
  // ═══════════════════════════════════

  const rand = (min, max) => Math.random() * (max - min) + min;
  const randInt = (min, max) => Math.floor(rand(min, max + 1));
  const dist = (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1);
  const lerp = (a, b, t) => a + (b - a) * t;

  // ═══════════════════════════════════
  //  粒子类
  // ═══════════════════════════════════

  class Particle {
    constructor() {
      this.reset(true);
    }

    reset(initial = false) {
      // 位置
      if (initial) {
        this.x = rand(0, W);
        this.y = rand(0, H);
      } else {
        // 重生在画布边缘
        const edge = randInt(0, 3);
        switch (edge) {
          case 0: this.x = rand(0, W);       this.y = -20;          break; // 上
          case 1: this.x = rand(0, W);       this.y = H + 20;       break; // 下
          case 2: this.x = -20;              this.y = rand(0, H);   break; // 左
          case 3: this.x = W + 20;           this.y = rand(0, H);   break; // 右
        }
      }

      // 基础运动参数
      this.vx = rand(-0.4, 0.4);
      this.vy = rand(-0.4, 0.4);
      this.baseVX = this.vx;
      this.baseVY = this.vy;

      // 视觉属性
      this.radius = rand(1.0, 4.2);
      this.baseRadius = this.radius;

      // 颜色 — 从调色板选一个并微调
      const pal = PALETTES[randInt(0, PALETTES.length - 1)];
      this.colorR = Math.min(255, Math.max(0, pal.r + randInt(-30, 30)));
      this.colorG = Math.min(255, Math.max(0, pal.g + randInt(-30, 30)));
      this.colorB = Math.min(255, Math.max(0, pal.b + randInt(-30, 30)));

      // 闪烁
      this.twinklePhase  = rand(0, Math.PI * 2);
      this.twinkleSpeed   = rand(0.008, 0.04);
      this.twinkleAmp     = rand(0.3, 0.7);
      this.currentAlpha   = 0;
      this.twinkleBaseAlpha = rand(0.5, 1.0);

      // 光晕概率（大型粒子才有）
      this.hasGlow = this.baseRadius > 2.2 && Math.random() < 0.45;

      // 鼠标吸引力系数（每个粒子不同，产生层次感）
      this.attractionForce = rand(0.015, 0.08);
    }

    update() {
      // ── 闪烁 ─────────────────────
      this.twinklePhase += this.twinkleSpeed;
      const twinkle = Math.sin(this.twinklePhase) * this.twinkleAmp;
      this.currentAlpha = this.twinkleBaseAlpha + twinkle;
      this.radius = this.baseRadius + twinkle * 0.6;

      // ── 靠近鼠标时被吸引 ─────────
      if (mouseOnCanvas) {
        const d = dist(this.x, this.y, smoothMX, smoothMY);
        const influenceRadius = 200;

        if (d < influenceRadius) {
          // 吸引力随距离递减（越近越强）
          const strength = (1 - d / influenceRadius) ** 1.8;
          const force = strength * this.attractionForce;

          // 指向鼠标的方向
          const dx = smoothMX - this.x;
          const dy = smoothMY - this.y;
          const len = Math.hypot(dx, dy) || 1;
          const nx = dx / len;
          const ny = dy / len;

          // 应用吸引力（加一点螺旋运动）
          const spiral = strength * 0.03;
          this.vx += nx * force + ny * spiral;
          this.vy += ny * force - nx * spiral;
        }

        // 鼠标很近时的排斥力，防止全部堆积
        if (d < 45) {
          const repelStrength = (1 - d / 45) ** 2 * 0.25;
          const dx = this.x - smoothMX;
          const dy = this.y - smoothMY;
          const len = Math.hypot(dx, dy) || 1;
          this.vx += (dx / len) * repelStrength;
          this.vy += (dy / len) * repelStrength;
        }
      }

      // ── 速度阻尼，回到基础速度 ──
      this.vx = lerp(this.vx, this.baseVX, 0.012);
      this.vy = lerp(this.vy, this.baseVY, 0.012);

      // 速度上限
      const speed = Math.hypot(this.vx, this.vy);
      const maxSpeed = 4.5;
      if (speed > maxSpeed) {
        this.vx = (this.vx / speed) * maxSpeed;
        this.vy = (this.vy / speed) * maxSpeed;
      }

      // ── 移动 ─────────────────────
      this.x += this.vx;
      this.y += this.vy;

      // ── 边界处理（包裹循环）─────
      const margin = 40;
      if (this.x < -margin)      this.x = W + margin;
      if (this.x > W + margin)   this.x = -margin;
      if (this.y < -margin)      this.y = H + margin;
      if (this.y > H + margin)   this.y = -margin;
    }

    draw(ctx) {
      const alpha = Math.max(0.05, Math.min(1, this.currentAlpha));
      const { x, y, radius: r } = this;

      ctx.save();

      if (this.hasGlow) {
        // 外层光晕
        const glow = ctx.createRadialGradient(x, y, r * 0.2, x, y, r * 3.5);
        glow.addColorStop(0, `rgba(${this.colorR},${this.colorG},${this.colorB},${alpha * 0.9})`);
        glow.addColorStop(0.4, `rgba(${this.colorR},${this.colorG},${this.colorB},${alpha * 0.35})`);
        glow.addColorStop(1, `rgba(${this.colorR},${this.colorG},${this.colorB},0)`);
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(x, y, r * 3.5, 0, Math.PI * 2);
        ctx.fill();
      }

      // 主体 — 带光晕的圆
      const bodyGlow = ctx.createRadialGradient(x, y, 0, x, y, r);
      bodyGlow.addColorStop(0, `rgba(255,255,255,${alpha})`);
      bodyGlow.addColorStop(0.35, `rgba(${this.colorR},${this.colorG},${this.colorB},${alpha})`);
      bodyGlow.addColorStop(1, `rgba(${this.colorR},${this.colorG},${this.colorB},0)`);
      ctx.fillStyle = bodyGlow;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }
  }

  // ═══════════════════════════════════
  //  初始化 & 画布大小调整
  // ═══════════════════════════════════

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    centerX = W / 2;
    centerY = H / 2;
  }

  function initParticles() {
    particles = [];
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push(new Particle());
    }
  }

  // ═══════════════════════════════════
  //  粒子间连线
  // ═══════════════════════════════════

  function drawConnections() {
    const maxDist = 130;
    const mouseMaxDist = 180; // 鼠标到粒子的连线更长
    let lineCount = 0;

    // 使用空间哈希简单优化 — 只在相邻粒子间检测
    // 因为粒子数不多（260），直接两两检测即可
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];

      for (let j = i + 1; j < particles.length; j++) {
        const q = particles[j];
        const d = dist(p.x, p.y, q.x, q.y);

        if (d < maxDist) {
          const alpha = (1 - d / maxDist) ** 2.2;
          const avgAlpha = (p.currentAlpha + q.currentAlpha) / 2;
          const finalAlpha = alpha * avgAlpha * 0.6;

          // 颜色取两个粒子的平均
          const r = Math.round((p.colorR + q.colorR) / 2);
          const g = Math.round((p.colorG + q.colorG) / 2);
          const b = Math.round((p.colorB + q.colorB) / 2);

          ctx.strokeStyle = `rgba(${r},${g},${b},${finalAlpha})`;
          ctx.lineWidth = alpha * 0.9;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(q.x, q.y);
          ctx.stroke();

          lineCount++;
        }
      }

      // 鼠标到粒子的连线
      if (mouseOnCanvas) {
        const md = dist(p.x, p.y, smoothMX, smoothMY);
        if (md < mouseMaxDist) {
          const alpha = (1 - md / mouseMaxDist) ** 1.6;
          const finalAlpha = alpha * p.currentAlpha * 0.5;

          const grad = ctx.createLinearGradient(p.x, p.y, smoothMX, smoothMY);
          grad.addColorStop(0, `rgba(${p.colorR},${p.colorG},${p.colorB},${finalAlpha})`);
          grad.addColorStop(1, `rgba(200,220,255,${finalAlpha * 0.7})`);

          ctx.strokeStyle = grad;
          ctx.lineWidth = alpha * 1.2;
          ctx.beginPath();
          ctx.moveTo(p.x, p.y);
          ctx.lineTo(smoothMX, smoothMY);
          ctx.stroke();

          lineCount++;
        }
      }
    }

    visibleLines = lineCount;
  }

  // ═══════════════════════════════════
  //  背景星云光晕（大尺度柔和光斑）
  // ═══════════════════════════════════

  let nebulaTime = 0;
  function drawNebula() {
    nebulaTime += 0.0003;

    // 光斑 1
    const nx1 = centerX + Math.sin(nebulaTime * 0.7) * W * 0.3;
    const ny1 = centerY + Math.cos(nebulaTime * 0.5) * H * 0.25;
    const g1 = ctx.createRadialGradient(nx1, ny1, 0, nx1, ny1, W * 0.35);
    g1.addColorStop(0, 'rgba(30,50,120,0.12)');
    g1.addColorStop(0.5, 'rgba(15,25,60,0.04)');
    g1.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g1;
    ctx.fillRect(0, 0, W, H);

    // 光斑 2
    const nx2 = centerX + Math.cos(nebulaTime * 0.9) * W * 0.35;
    const ny2 = centerY + Math.sin(nebulaTime * 0.6) * H * 0.3;
    const g2 = ctx.createRadialGradient(nx2, ny2, 0, nx2, ny2, W * 0.28);
    g2.addColorStop(0, 'rgba(80,30,80,0.10)');
    g2.addColorStop(0.5, 'rgba(30,10,40,0.03)');
    g2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, W, H);
  }

  // ═══════════════════════════════════
  //  鼠标附近的微光粒子轨迹
  // ═══════════════════════════════════

  const trailParticles = [];
  const MAX_TRAIL = 30;

  function spawnTrailParticle() {
    if (!mouseOnCanvas) return;
    trailParticles.push({
      x: smoothMX + rand(-6, 6),
      y: smoothMY + rand(-6, 6),
      radius: rand(1.2, 3.5),
      alpha: rand(0.5, 0.9),
      life: 1,
      decay: rand(0.015, 0.04),
      color: PALETTES[randInt(0, PALETTES.length - 1)],
    });
    if (trailParticles.length > MAX_TRAIL) {
      trailParticles.shift();
    }
  }

  function updateAndDrawTrail() {
    for (let i = trailParticles.length - 1; i >= 0; i--) {
      const tp = trailParticles[i];
      tp.life -= tp.decay;
      tp.radius *= 0.992;
      if (tp.life <= 0) {
        trailParticles.splice(i, 1);
        continue;
      }

      const a = tp.alpha * tp.life;
      const glow = ctx.createRadialGradient(tp.x, tp.y, 0, tp.x, tp.y, tp.radius * 2.5);
      glow.addColorStop(0, `rgba(${tp.color.r},${tp.color.g},${tp.color.b},${a})`);
      glow.addColorStop(1, `rgba(${tp.color.r},${tp.color.g},${tp.color.b},0)`);
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.arc(tp.x, tp.y, tp.radius * 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ═══════════════════════════════════
  //  主循环
  // ═══════════════════════════════════

  function animate(timestamp) {
    // ── FPS 统计 ──────────────────
    frameCount++;
    if (timestamp - lastFpsTime >= 1000) {
      fps = Math.round(frameCount / ((timestamp - lastFpsTime) / 1000));
      frameCount = 0;
      lastFpsTime = timestamp;
    }

    // ── 平滑鼠标位置 ──────────────
    const lerpFactor = 0.08;
    smoothMX = lerp(smoothMX, mouseX, lerpFactor);
    smoothMY = lerp(smoothMY, mouseY, lerpFactor);

    // ── 鼠标轨迹粒子 ──────────────
    if (mouseActive && mouseOnCanvas && Math.random() < 0.6) {
      spawnTrailParticle();
    }

    // ── 清屏 ──────────────────────
    ctx.clearRect(0, 0, W, H);

    // ── 背景渐变 ──────────────────
    const bgGrad = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, Math.max(W, H) * 0.7);
    bgGrad.addColorStop(0, '#0a0a20');
    bgGrad.addColorStop(1, '#020208');
    ctx.fillStyle = bgGrad;
    ctx.fillRect(0, 0, W, H);

    // ── 星云 ──────────────────────
    drawNebula();

    // ── 更新粒子 ──────────────────
    for (const p of particles) {
      p.update();
    }

    // ── 连线 ──────────────────────
    drawConnections();

    // ── 绘制粒子 ──────────────────
    for (const p of particles) {
      p.draw(ctx);
    }

    // ── 鼠标轨迹 ──────────────────
    updateAndDrawTrail();

    // ── 鼠标附近的引力场可视化 ────
    if (mouseOnCanvas) {
      const fieldGrad = ctx.createRadialGradient(smoothMX, smoothMY, 0, smoothMX, smoothMY, 180);
      fieldGrad.addColorStop(0, 'rgba(120,160,255,0.06)');
      fieldGrad.addColorStop(0.5, 'rgba(80,120,220,0.02)');
      fieldGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = fieldGrad;
      ctx.beginPath();
      ctx.arc(smoothMX, smoothMY, 180, 0, Math.PI * 2);
      ctx.fill();
    }

    // ── 更新 HUD ──────────────────
    hudCount.textContent = particles.length;
    hudLines.textContent = visibleLines;
    hudFPS.textContent = fps;

    // ── 自定义光标位置 ────────────
    cursorOuter.style.left = mouseX + 'px';
    cursorOuter.style.top  = mouseY + 'px';
    cursorInner.style.left = mouseX + 'px';
    cursorInner.style.top  = mouseY + 'px';

    requestAnimationFrame(animate);
  }

  // ═══════════════════════════════════
  //  事件监听
  // ═══════════════════════════════════

  window.addEventListener('resize', () => {
    resize();
    initParticles();
  });

  document.addEventListener('mousemove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (!mouseActive) {
      mouseActive = true;
      smoothMX = mouseX;
      smoothMY = mouseY;
      // 隐藏提示
      hintEl.style.opacity = '0';
      setTimeout(() => { hintEl.textContent = ''; }, 800);
    }
  });

  canvas.addEventListener('mouseenter', () => {
    mouseOnCanvas = true;
    document.body.style.cursor = 'none';
  });

  canvas.addEventListener('mouseleave', () => {
    mouseOnCanvas = false;
    document.body.style.cursor = 'default';
  });

  // 触摸支持
  document.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    mouseX = t.clientX;
    mouseY = t.clientY;
    mouseOnCanvas = true;
    if (!mouseActive) {
      mouseActive = true;
      smoothMX = mouseX;
      smoothMY = mouseY;
      hintEl.style.opacity = '0';
      setTimeout(() => { hintEl.textContent = ''; }, 800);
    }
  }, { passive: false });

  document.addEventListener('touchend', () => {
    mouseOnCanvas = false;
  });

  // 点击生成一波粒子脉冲
  canvas.addEventListener('click', (e) => {
    const cx = e.clientX;
    const cy = e.clientY;
    // 向周围粒子施加一个爆发力
    for (const p of particles) {
      const d = dist(p.x, p.y, cx, cy);
      if (d < 250) {
        const strength = (1 - d / 250) ** 2 * 8;
        const dx = p.x - cx;
        const dy = p.y - cy;
        const len = Math.hypot(dx, dy) || 1;
        p.vx += (dx / len) * strength;
        p.vy += (dy / len) * strength;
      }
    }
    // 视觉反馈 — 光标瞬间放大
    cursorOuter.style.width  = '60px';
    cursorOuter.style.height = '60px';
    cursorOuter.style.borderColor = 'rgba(180,210,255,0.8)';
    cursorOuter.style.boxShadow = '0 0 30px rgba(140,180,255,0.5)';
    setTimeout(() => {
      cursorOuter.style.width  = '36px';
      cursorOuter.style.height = '36px';
      cursorOuter.style.borderColor = 'rgba(180,200,255,0.45)';
      cursorOuter.style.boxShadow = 'none';
    }, 300);
  });

  // ═══════════════════════════════════
  //  启动
  // ═══════════════════════════════════

  resize();
  initParticles();
  requestAnimationFrame(animate);
})();
</script>
